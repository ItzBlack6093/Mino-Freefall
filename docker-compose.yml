services:
  mino-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      DB_PATH: /data/db.sqlite
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
    volumes:
      - mino_server_data:/data
    expose:
      - "8080"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - mino-server
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  mino_server_data:
  caddy_data:
  caddy_config:
